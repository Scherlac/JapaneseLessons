[alembic]
script_location = alembic
prepend_sys_path = .
# DB path is resolved at runtime (see alembic/env.py).
# Set JLESSON_RCM_DB env var or pass -x db_path=<path> to any alembic command.
# Example: $env:JLESSON_RCM_DB = "C:\Users\scher\.jlesson\northern_exposure\rcm.db"
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S